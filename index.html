/* ═══════════ PR DETECTION ═══════════ */
function detectPRs(workouts,exercises){
  // Returns map: exerciseId -> {maxWeight, maxVolume, maxReps, dates}
  const prs={};
  workouts.forEach(w=>{
    w.entries.forEach(en=>{
      if(!prs[en.eid])prs[en.eid]={maxW:0,maxWDate:null,maxVol:0,maxVolDate:null,maxReps:0,maxRepsDate:null};
      const p=prs[en.eid];
      const topW=Math.max(...en.sets.map(s=>s.w||0));
      const vol=en.sets.reduce((a,s)=>a+(s.r||0)*(s.w||0),0);
      const reps=en.sets.reduce((a,s)=>a+(s.r||0),0);
      if(topW>p.maxW){p.maxW=topW;p.maxWDate=w.date;}
      if(vol>p.maxVol){p.maxVol=vol;p.maxVolDate=w.date;}
      if(reps>p.maxReps){p.maxReps=reps;p.maxRepsDate=w.date;}
    });
  });
  return prs;
}

function checkNewPRs(existingPRs,newEntries,workoutDate){
  // Returns array of PR notifications
  const hits=[];
  newEntries.forEach(en=>{
    const old=existingPRs[en.eid];
    if(!old)return;
    const topW=Math.max(...en.sets.map(s=>s.w||0));
    const vol=en.sets.reduce((a,s)=>a+(s.r||0)*(s.w||0),0);
    if(topW>old.maxW&&topW>0)hits.push({eid:en.eid,name:en.name,type:"Weight",val:`${topW}kg`,prev:`${old.maxW}kg`});
    if(vol>old.maxVol&&vol>0)hits.push({eid:en.eid,name:en.name,type:"Volume",val:vol.toLocaleString(),prev:old.maxVol.toLocaleString()});
  });
  return hits;
}

async function supaSubmitWorkout(wo,username){
  if(!supaClient)return null;
  try{
    const row={
      user_id:ANON_ID,
      username:username||"Anonymous",
      local_id:wo.id,
      workout_name:wo.entries.map(e=>e.name).slice(0,3).join(", "),
      total_volume:wo.volume||0,
      duration_seconds:wo.duration||0,
      exercise_count:wo.entries.length,
      exercises:wo.entries.map(e=>e.name),
      muscle_groups:[...new Set(wo.entries.flatMap(e=>e.mg||[]))],
    };
    const{data,error}=await supaClient.from("workout_sessions").insert(row).select();
    if(error)console.warn("Supa insert error:",error);
    return data;
  }catch(e){console.warn("Supa submit failed:",e);return null;}
}

async function supaDeleteWorkout(localId){
  if(!supaClient||!localId)return;
  try{
    await supaClient.from("workout_sessions").delete().eq("local_id",localId).eq("user_id",ANON_ID);
  }catch(e){console.warn("Supa delete failed:",e);}
}

async function supaFetchLeaderboard(period){
  if(!supaClient)return[];
  try{
    let query=supaClient.from("workout_sessions").select("*");
    if(period==="week"){
      const d=new Date();d.setDate(d.getDate()-7);
      query=query.gte("created_at",d.toISOString());
    }else if(period==="month"){
      const d=new Date();d.setMonth(d.getMonth()-1);
      query=query.gte("created_at",d.toISOString());
    }
    const{data,error}=await query.order("total_volume",{ascending:false}).limit(50);
    if(error){console.warn("Supa fetch error:",error);return[];}
    return data||[];
  }catch(e){console.warn("Supa fetch failed:",e);return[];}
}

/* ═══════════ CHART COMPONENT ═══════════ */
const ChartCanvas=({type,data:chartData,options,height=160})=>{
  const canvasRef=useRef(null);
  const chartRef=useRef(null);
  useEffect(()=>{
    if(chartRef.current)chartRef.current.destroy();
    if(!canvasRef.current||!chartData)return;
    const ctx=canvasRef.current.getContext("2d");
    chartRef.current=new Chart(ctx,{type,data:chartData,options:{responsive:true,maintainAspectRatio:false,animation:{duration:600},plugins:{legend:{display:false},tooltip:{backgroundColor:"#1a1a1a",titleColor:"#aaa",bodyColor:"#eee",borderColor:"#333",borderWidth:1,cornerRadius:8,padding:8,bodyFont:{family:"'JetBrains Mono'",size:11},titleFont:{family:"'Outfit'",size:11}}},...options}});
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[chartData,type,options]);
  return <div style={{height,position:"relative"}}><canvas ref={canvasRef}/></div>;
};

/* ═══════════ BEEP SOUND (iOS compatible) ═══════════ */
let beepCtx=null;
let beepUnlocked=false;

function getAudioCtx(){
  if(!beepCtx){
    try{beepCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}
  }
  return beepCtx;
}

function unlockAudio(){
  if(beepUnlocked)return;
  const ctx=getAudioCtx();
  if(!ctx)return;
  if(ctx.state==="suspended")ctx.resume();
  // Silent buffer to unlock iOS audio
  const buf=ctx.createBuffer(1,1,22050);
  const src=ctx.createBufferSource();
  src.buffer=buf;src.connect(ctx.destination);
  src.start(0);
  beepUnlocked=true;
}

// Unlock on ANY user interaction
if(typeof document!=="undefined"){
  const events=["touchstart","touchend","click","keydown"];
  const doUnlock=()=>{unlockAudio();events.forEach(e=>document.removeEventListener(e,doUnlock,true));};
  events.forEach(e=>document.addEventListener(e,doUnlock,true));
}

function playBeep(freq,duration){
  const f=freq||880,dur=duration||0.12;
  const ctx=getAudioCtx();
  if(!ctx)return;
  try{
    if(ctx.state==="suspended")ctx.resume();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type="sine";o.frequency.value=f;
    g.gain.setValueAtTime(0.4,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+dur);
    o.start(ctx.currentTime);
    o.stop(ctx.currentTime+dur);
  }catch(e){}
}

  const startLive=()=>{setLiveOn(true);setLiveStart(Date.now());setLiveEl(0);setLiveEnt([]);setLiveNotes("");setView("live");};

  const finishLive=()=>{
    const valid=liveEnt.filter(e=>e.sets.length>0);

      // PR detection before saving
      const oldPRs=detectPRs(data.workouts,data.exercises);

  const addManSet=ei=>setWEntries(p=>p.map((e,i)=>{if(i!==ei)return e;const ls=e.sets[e.sets.length-1];return{...e,sets:[...e.sets,{r:ls?.r||10,w:ls?.w||0}]};}));
  const rmManSet=(ei,si)=>{const u=wEntries.map((e,i)=>i===ei?{...e,sets:e.sets.filter((_,j)=>j!==si)}:e);setWEntries(u.filter(e=>e.sets.length>0));};

      {/* ═══ TEMPLATE BUILDER MODAL ═══ */}

          <button onClick={()=>useSeedProg(previewProg)} style={{width:"100%",padding:"13px",borderRadius:12,background:"linear-gradient(135deg,#5BAE6B,#4A9B5C)",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:6,boxShadow:"0 4px 20px rgba(91,174,107,0.25)"}}>

            <div>

            </div>
          </div>
          {bmWeight&&(

            </div>

          <button onClick={saveBM} disabled={!bmWeight} style={{width:"100%",padding:"13px",borderRadius:12,background:bmWeight?T.accent:"rgba(255,255,255,0.06)",color:bmWeight?"#fff":"#555",cursor:bmWeight?"pointer":"default",fontSize:14,fontWeight:600,boxShadow:bmWeight?`0 4px 20px ${T.accent}30`:"none"}}>
            {bmEditId?"Update":"Save"} Entry
          </button>
        </Modal>

      {showWM&&(
        <Modal title={editId?"Edit Workout":"Log Workout"} onClose={()=>{setShowWM(false);setEditId(null);}}>

          {wEntries.map((en,idx)=>(

              <button onClick={()=>addManSet(idx)} style={{width:"100%",padding:"6px",borderRadius:6,border:"1px dashed rgba(255,255,255,0.08)",color:"#555",cursor:"pointer",fontSize:11,marginTop:4}}>+ Set</button>
            </div>

          {showEP?<ExPicker exercises={data.exercises} onSelect={addManEx} onClose={()=>setShowEP(false)}/>:(
            <button onClick={()=>setShowEP(true)} style={{width:"100%",padding:"11px",borderRadius:10,border:"1px dashed rgba(255,255,255,0.1)",color:"#888",cursor:"pointer",fontSize:12,marginBottom:14,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              <Icon d={I.plus} size={14} color="#888"/> Add Exercise
            </button>
          )}

          <textarea value={wNotes} onChange={e=>setWNotes(e.target.value)} rows={2} placeholder="Notes..." style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.04)",color:"#e8e8e8",fontSize:13,resize:"vertical",minHeight:44,marginBottom:16}}/>

          <button onClick={saveWO} style={{width:"100%",padding:"13px",borderRadius:12,background:"#E8634A",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:6,boxShadow:"0 4px 20px rgba(232,99,74,0.3)"}}>
            <Icon d={I.save} size={15} color="#fff"/> {editId?"Update":"Save"} Workout
          </button>
        </Modal>

          </div>
          <div style={{marginBottom:20}}>
            <label style={{fontSize:10,color:"#555",letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:6,display:"block",fontWeight:500}}>Muscle Groups</label>

          <div style={{background:"#151515",borderRadius:16,padding:24,maxWidth:320,width:"90%",border:"1px solid rgba(255,255,255,0.06)",textAlign:"center"}}>

            <div style={{fontSize:40,marginBottom:8}}>🏆</div>
            <h2 style={{fontSize:20,fontWeight:800,marginBottom:4,background:"linear-gradient(135deg,#E8634A,#D4A843)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>New PR{prNotifs.length>1?"s":""}!</h2>
            <p style={{fontSize:12,color:"#888",marginBottom:20}}>You just set {prNotifs.length} personal record{prNotifs.length>1?"s":""}!</p>

            {prNotifs.map((pr,i)=>(
              <div key={i} style={{background:"rgba(232,99,74,0.06)",borderRadius:10,padding:12,marginBottom:8,border:"1px solid rgba(232,99,74,0.1)",textAlign:"left"}}>
                <div style={{fontSize:13,fontWeight:600,color:"#eee",marginBottom:2}}>{pr.name}</div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:11,color:"#888"}}>{pr.type} PR</span>
                  <div>
                    <span style={{fontSize:10,color:"#666",textDecoration:"line-through",marginRight:6}}>{pr.prev}</span>
                    <span style={{fontSize:14,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:"#E8634A"}}>{pr.val}</span>
                  </div>
                </div>
              </div>
            ))}

            <button onClick={()=>{setShowPRs(false);setPrNotifs([]);}} style={{width:"100%",marginTop:16,padding:"12px",borderRadius:12,background:"linear-gradient(135deg,#E8634A,#D4A843)",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:600,boxShadow:"0 4px 20px rgba(232,99,74,0.3)"}}>
              Let's Go!
            </button>
          </div>
        </div>
      )}

      {/* ═══ IMPORT MODAL ═══ */}
      {showImport&&(
        <Modal title="Import Data" onClose={()=>{setShowImport(false);setImportTxt("");}}>
          <p style={{fontSize:12,color:"#888",marginBottom:12,lineHeight:1.4}}>Paste your backup JSON below. This will replace all current data.</p>
          <textarea value={importTxt} onChange={e=>setImportTxt(e.target.value)} rows={6}
            placeholder='{"workouts":[...],...}'
            style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.04)",color:"#e8e8e8",fontSize:10,fontFamily:"'JetBrains Mono',monospace",resize:"vertical",minHeight:100,marginBottom:12}}/>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{setShowImport(false);setImportTxt("");}} style={{flex:1,padding:"12px",borderRadius:10,border:"1px solid rgba(255,255,255,0.08)",color:"#888",cursor:"pointer",fontSize:13}}>Cancel</button>
            <button onClick={()=>importData(importTxt)} disabled={!importTxt.trim()} style={{flex:1,padding:"12px",borderRadius:10,background:importTxt.trim()?"#E8634A":"rgba(255,255,255,0.06)",color:importTxt.trim()?"#fff":"#555",cursor:importTxt.trim()?"pointer":"default",fontSize:13,fontWeight:600}}>Restore</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
